      "中心": "大模型中心",
      "净变化": -8
    },
    {
      "分区名称": "ailab-safer2ai",
      "中心": "安全可信AI中心",
      "净变化": 8
    },
    {
      "分区名称": "ailab-mineru2",
      "中心": "数据平台中心",
      "净变化": 8
    },
    {
      "分区名称": "ailab-formalverification",
      "中心": "前沿探索中心",
      "净变化": 8
    },
    {
      "分区名称": "ailab-puyullmgpu",
      "中心": "大模型中心",
      "净变化": 16
    },
    {
      "分区名称": "ailab-protfma",
      "中心": "AI for Science中心",
      "净变化": 16
    },
    {
      "分区名称": "vc-a2-discovery",
      "中心": "AI for Science中心",
      "净变化": 24
    },
    {
      "分区名称": "ailab-safewt",
      "中心": "安全可信AI中心",
      "净变化": 40
    },
    {
      "分区名称": "ailab-evoagi",
      "中心": "安全可信AI中心",
      "净变化": 40
    },
    {
      "分区名称": "vc-ams-deepseek",
      "中心": "数据平台中心",
      "净变化": 224
    }
  ]
};

let chartTotal, chartCenter, chartRank, chartPopup;
let currentCenterFilter = '';
let currentSearch = '';
let currentGpuFilter = '';
let showOnlyChanged = false;

function initAll() {
  renderKPIs();
  renderTotalTrend();
  renderCenterTrend();
  renderRankChart();
  renderFilters();
  renderTable();
}

function renderKPIs() {
  const total = rawData.daily_total;
  const start = total[0];
  const end = total[total.length - 1];
  const diff = end - start;
  const parts = Object.values(rawData.partition_trends);
  const up = parts.filter(p => p.净变化 > 0).length;
  const down = parts.filter(p => p.净变化 < 0).length;

  document.getElementById('kpi-start').textContent = start.toLocaleString();
  document.getElementById('kpi-end').textContent = end.toLocaleString();
  const diffEl = document.getElementById('kpi-diff');
  diffEl.textContent = (diff >= 0 ? '+' : '') + diff.toLocaleString();
  diffEl.className = 'kpi-change ' + (diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral');
  document.getElementById('kpi-changed').textContent = parts.length;
  document.getElementById('kpi-updown').textContent = up + ' / ' + down;
}

function renderTotalTrend() {
  chartTotal = echarts.init(document.getElementById('chart-total'));
  const dates = rawData.dates;
  const total = rawData.daily_total;
  const changes = total.map((v, i) => i === 0 ? 0 : v - total[i-1]);

  chartTotal.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    legend: { data: ['总卡数', '日变化量'], bottom: 0 },
    grid: { left: 60, right: 60, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: dates, axisLabel: { rotate: 0 } },
    yAxis: [
      { type: 'value', name: '卡数', position: 'left' },
      { type: 'value', name: '变化量', position: 'right' }
    ],
    series: [
      { name: '总卡数', type: 'line', data: total, smooth: true, symbol: 'circle', symbolSize: 8,
        itemStyle: { color: '#4a90d9' }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops:[{offset:0,color:'rgba(74,144,217,0.3)'},{offset:1,color:'rgba(74,144,217,0.05)'}] } } },
      { name: '日变化量', type: 'bar', data: changes, yAxisIndex: 1,
        itemStyle: { color: p => p.value >= 0 ? '#e74c3c' : '#27ae60' } }
    ]
  });
}

function renderCenterTrend() {
  chartCenter = echarts.init(document.getElementById('chart-center'));
  const series = rawData.centers.map((center, idx) => ({
    name: center,
    type: 'line',
    stack: 'total',
    areaStyle: {},
    emphasis: { focus: 'series' },
    data: rawData.center_daily[center],
    smooth: true
  }));

  const colors = ['#4a90d9','#e74c3c','#27ae60','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#d35400'];

  chartCenter.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
    legend: { data: rawData.centers, bottom: 0, type: 'scroll' },
    color: colors,
    grid: { left: 60, right: 40, top: 20, bottom: 80 },
    xAxis: { type: 'category', boundaryGap: false, data: rawData.dates },
    yAxis: { type: 'value', name: '卡数' },
    series: series
  });
}

function renderRankChart() {
  chartRank = echarts.init(document.getElementById('chart-rank'));
  const items = Object.entries(rawData.partition_trends)
    .map(([k, v]) => ({ name: k, ...v }))
    .sort((a, b) => a.净变化 - b.净变化);

  const names = items.map(i => i.name);
  const values = items.map(i => i.净变化);

  chartRank.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' },
      formatter: p => {
        const d = p[0];
        const item = items[d.dataIndex];
        return '<b>' + d.name + '</b><br/>中心: ' + item.中心 + '<br/>GPU: ' + item.GPU类型 + '<br/>4.23: ' + item.起始卡数 + ' → 5.6: ' + item.结束卡数 + '<br/>净变化: <b>' + (d.value > 0 ? '+' : '') + d.value + '</b>';
      }
    },
    grid: { left: 180, right: 60, top: 10, bottom: 20 },
    xAxis: { type: 'value', name: '净变化（卡）' },
    yAxis: { type: 'category', data: names, axisLabel: { fontSize: 11 } },
    series: [{
      type: 'bar',
      data: values,
      itemStyle: { color: p => p.value >= 0 ? '#e74c3c' : '#27ae60', borderRadius: [0, 4, 4, 0] },
      label: { show: true, position: p => p.value >= 0 ? 'right' : 'left', formatter: p => (p.value > 0 ? '+' : '') + p.value, fontSize: 11 }
    }]
  });
}

function renderFilters() {
  const parts = Object.values(rawData.partition_trends);
  const gpus = [...new Set(parts.map(p => p.GPU类型))];
  const sel = document.getElementById('gpu-filter');
  gpus.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });

  const centers = [...new Set(parts.map(p => p.中心))];
  const chipRow = document.getElementById('center-chips');
  const allChip = document.createElement('div');
  allChip.className = 'center-chip active';
  allChip.textContent = '全部中心';
  allChip.onclick = function() { setCenterFilter('', this); };
  chipRow.appendChild(allChip);
  centers.forEach(c => {
    const chip = document.createElement('div');
    chip.className = 'center-chip';
    chip.textContent = c;
    chip.onclick = function() { setCenterFilter(c, this); };
    chipRow.appendChild(chip);
  });

  document.getElementById('search-input').addEventListener('input', e => { currentSearch = e.target.value; renderTable(); });
  document.getElementById('gpu-filter').addEventListener('change', e => { currentGpuFilter = e.target.value; renderTable(); });
  document.getElementById('only-change').addEventListener('change', e => { showOnlyChanged = e.target.checked; renderTable(); });
}

function setCenterFilter(c, el) {
  currentCenterFilter = c;
  document.querySelectorAll('.center-chip').forEach(chip => chip.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function gpuClass(g) {
  const map = { 'A100': 'tag-a100', 'A800': 'tag-a800', 'H200': 'tag-h200', '910B': 'tag-910b', '910C': 'tag-910c' };
  return map[g] || 'tag-default';
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  let items = Object.entries(rawData.partition_trends).map(([k, v]) => ({ name: k, ...v }));

  if (showOnlyChanged) {
    items = items.filter(i => i.净变化 !== 0);
  }
  if (currentCenterFilter) {
    items = items.filter(i => i.中心 === currentCenterFilter);
  }
  if (currentGpuFilter) {
    items = items.filter(i => i.GPU类型 === currentGpuFilter);
  }
  if (currentSearch) {
    items = items.filter(i => i.name.toLowerCase().includes(currentSearch.toLowerCase()));
  }

  items.forEach(item => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = () => showPopup(item.name);

    const trendHtml = '<div class="date-cols">' + item.每日卡数.map((v, i) => {
      const prev = i > 0 ? item.每日卡数[i-1] : v;
      const changed = v !== prev;
      return '<div class="date-cell" style="' + (changed ? 'font-weight:700;color:#e74c3c;' : '') + '">' + v + '</div>';
    }).join('') + '</div>';

    const changeClass = item.净变化 > 0 ? 'change-pos' : item.净变化 < 0 ? 'change-neg' : 'change-zero';
    const changeText = (item.净变化 > 0 ? '+' : '') + item.净变化;

    tr.innerHTML = '<td><b>' + item.name + '</b></td>' +
      '<td>' + item.中心 + '</td>' +
      '<td><span class="tag ' + gpuClass(item.GPU类型) + '">' + item.GPU类型 + '</span></td>' +
      '<td>' + item.所属集群 + '</td>' +
      '<td>' + item.起始卡数 + '</td>' +
      '<td>' + item.结束卡数 + '</td>' +
      '<td class="' + changeClass + '">' + changeText + '</td>' +
      '<td>' + trendHtml + '<div style="display:flex;gap:4px;margin-top:2px;">' + rawData.dates.map(d => '<div class="date-cell" style="color:#bbb;font-size:10px;">' + d + '</div>').join('') + '</div></td>';
    tbody.appendChild(tr);
  });
}

function showPopup(partitionName) {
  const item = rawData.partition_trends[partitionName];
  if (!item) return;
  document.getElementById('popup-title').textContent = partitionName + ' 每日卡数趋势';
  document.getElementById('overlay').classList.add('active');
  document.getElementById('popup').classList.add('active');

  if (chartPopup) chartPopup.dispose();
  chartPopup = echarts.init(document.getElementById('chart-popup'));

  const changes = item.每日卡数.map((v, i) => i === 0 ? 0 : v - item.每日卡数[i-1]);

  chartPopup.setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: ['卡数', '日变化'], bottom: 0 },
    grid: { left: 60, right: 60, top: 20, bottom: 40 },
    xAxis: { type: 'category', data: rawData.dates },
    yAxis: [
      { type: 'value', name: '卡数', position: 'left' },
      { type: 'value', name: '变化', position: 'right' }
    ],
    series: [
      { name: '卡数', type: 'line', data: item.每日卡数, smooth: true, symbol: 'circle', symbolSize: 8, itemStyle: { color: '#4a90d9' }, areaStyle: { color: { type: 'linear', x:0,y:0,x2:0,y2:1, colorStops:[{offset:0,color:'rgba(74,144,217,0.3)'},{offset:1,color:'rgba(74,144,217,0.05)'}] } } },
      { name: '日变化', type: 'bar', data: changes, yAxisIndex: 1, itemStyle: { color: p => p.value >= 0 ? '#e74c3c' : '#27ae60' } }
    ]
  });
}

function closePopup() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('popup').classList.remove('active');
}

window.addEventListener('resize', () => {
  chartTotal && chartTotal.resize();
  chartCenter && chartCenter.resize();
  chartRank && chartRank.resize();
  chartPopup && chartPopup.resize();
});

initAll();
</script>
</body>
</html>
